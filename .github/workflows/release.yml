name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Enable Corepack
      run: corepack enable

    - name: Install dependencies
      run: yarn install --immutable

    - name: Build
      run: yarn build

    - name: Get version from tag
      id: version
      run: |
        REF="${GITHUB_REF#refs/tags/}"
        echo "VERSION=${REF#v}" >> $GITHUB_OUTPUT

    - name: Update version in package.json
      run: npm pkg set version=${{ steps.version.outputs.VERSION }}

    - name: Create release archive
      id: create_release
      run: |
        mkdir -p release
        cp ha-github-card.js release/
        cp README.md release/
        cp LICENSE release/ 2>/dev/null || true
        cp hacs.json release/
        cd release
        zip -r ../ha-github-card-${{ steps.version.outputs.VERSION }}.zip .

    - name: Generate changelog
      id: changelog
      run: |
        if [ -f CHANGELOG.md ]; then
          sed -n '/^## \[/,/^## \[/p' CHANGELOG.md | head -n -1 > current_changes.md
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          cat current_changes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          echo "CHANGELOG=Release ${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
        fi

    - name: Create GitHub Release and upload assets
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        NOTES="## GitHub Card ${{ steps.version.outputs.VERSION }}

        ### Installation

        **HACS:** Add this repository, search for \"GitHub Card\", install.

        **Manual:** Download \`ha-github-card.js\`, copy to \`config/www/ha-github-card/\`, add resource \`/local/ha-github-card/ha-github-card.js\`.

        ### Compatibility
        - Home Assistant 2024.1+
        - Requires the [GitHub integration](https://www.home-assistant.io/integrations/github/)
        "

        gh release create "${{ github.ref_name }}" \
          --title "GitHub Card ${{ steps.version.outputs.VERSION }}" \
          --notes "$NOTES" \
          --prerelease \
          --overwrite \
          "./ha-github-card-${{ steps.version.outputs.VERSION }}.zip" \
          "./release/ha-github-card.js"
