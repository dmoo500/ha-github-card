name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Enable Corepack
      run: corepack enable

    - name: Install dependencies
      run: yarn install --immutable

    - name: Build
      run: yarn build

    - name: Get version from tag
      id: version
      run: |
        REF="${GITHUB_REF#refs/tags/}"
        echo "VERSION=${REF#v}" >> $GITHUB_OUTPUT

    - name: Update version in package.json
      run: yarn version ${{ steps.version.outputs.VERSION }} --immediate

    - name: Create release archive
      id: create_release
      run: |
        mkdir -p release
        cp ha-github-card.js release/
        cp README.md release/
        cp LICENSE release/ 2>/dev/null || true
        cp hacs.json release/
        cd release
        zip -r ../ha-github-card-${{ steps.version.outputs.VERSION }}.zip .

    - name: Generate changelog
      id: changelog
      run: |
        if [ -f CHANGELOG.md ]; then
          sed -n '/^## \[/,/^## \[/p' CHANGELOG.md | head -n -1 > current_changes.md
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          cat current_changes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          echo "CHANGELOG=Release ${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
        fi

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        release_name: GitHub Card v${{ steps.version.outputs.VERSION }}
        body: |
          ## 🎉 GitHub Card v${{ steps.version.outputs.VERSION }}

          ### 📦 Installation

          #### HACS (Recommended)
          1. Add this repository to HACS
          2. Search for "GitHub Card"
          3. Install the latest version

          #### Manual
          1. Download `ha-github-card.js`
          2. Copy it to `config/www/ha-github-card/`
          3. Add the resource to Lovelace: `/local/ha-github-card/ha-github-card.js`

          ### 📋 Changelog
          ${{ steps.changelog.outputs.CHANGELOG }}

          ### 🔧 Compatibility
          - Home Assistant 2024.1+
          - Requires the [GitHub integration](https://www.home-assistant.io/integrations/github/)
          - Modern browsers (Chrome 90+, Firefox 88+, Safari 14+)

        draft: false
        prerelease: false

    - name: Upload release archive
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./ha-github-card-${{ steps.version.outputs.VERSION }}.zip
        asset_name: ha-github-card-${{ steps.version.outputs.VERSION }}.zip
        asset_content_type: application/zip
      continue-on-error: true

    - name: Upload individual file
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./release/ha-github-card.js
        asset_name: ha-github-card.js
        asset_content_type: application/javascript
      continue-on-error: true
