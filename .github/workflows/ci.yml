name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Enable Corepack
      run: corepack enable

    - name: Check Yarn version
      run: yarn --version

    - name: Install dependencies
      run: yarn install --immutable

    - name: Run TypeScript type check
      run: yarn type-check

    - name: Run ESLint
      run: yarn lint

    - name: Check formatting
      run: yarn format:check

    - name: Build
      run: yarn build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: ./ha-github-card.js

  validate-hacs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: HACS validation
      uses: hacs/action@main
      with:
        category: plugin

  release:
    if: github.event_name == 'release'
    needs: [lint-and-test, validate-hacs]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Enable Corepack
      run: corepack enable

    - name: Install dependencies
      run: yarn install --immutable

    - name: Build
      run: yarn build

    - name: Create release asset
      run: |
        mkdir -p dist
        cp ha-github-card.js dist/
        cp README.md dist/
        cp LICENSE dist/ 2>/dev/null || true
        cp hacs.json dist/
        cd dist
        zip -r ../ha-github-card-${{ github.event.release.tag_name }}.zip .

    - name: Upload release assets
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload "${{ github.event.release.tag_name }}" \
          "./ha-github-card-${{ github.event.release.tag_name }}.zip" \
          "./ha-github-card.js" \
          --clobber
